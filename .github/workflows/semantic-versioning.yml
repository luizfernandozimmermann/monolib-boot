name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  packages: write

jobs:
  versioning:
    name: Versioning
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.format_version.outputs.version }}
      version_tag: ${{ steps.version.outputs.version_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate semantic version
        id: version
        uses: PaulHatch/semantic-version@v6.0.1
        with:
          tag_prefix: "v"
          major_pattern: "BREAKING CHANGE|!:"
          minor_pattern: "^feat"
          version_format: "${major}.${minor}.${patch}"

      - name: Format version
        id: format_version
        run: |
          echo "version=${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT
          echo "Release version: ${{ steps.version.outputs.version }}"

  bump_and_tag:
    if: github.actor != 'github-actions[bot]'
    name: Bump + Tag
    runs-on: ubuntu-latest
    needs: versioning
    outputs:
      version_tag: ${{ needs.versioning.outputs.version_tag }}

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Set version in pom
        run: |
          mvn versions:set-property \
            -Dproperty=revision \
            -DnewVersion=${{ needs.versioning.outputs.version }} \
            -DgenerateBackupPoms=false

      - name: Commit + Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add pom.xml

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: bump version to ${{ needs.versioning.outputs.version }}"
          fi
          git tag ${{ needs.versioning.outputs.version_tag }}
          git push origin master --tags

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [versioning, bump_and_tag]

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.versioning.outputs.version_tag }}
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Publish
        run: mvn deploy -s $GITHUB_WORKSPACE/settings.xml
        env:
          GITHUB_TOKEN: ${{ github.token }}

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.versioning.outputs.version_tag }}
          generate_release_notes: true