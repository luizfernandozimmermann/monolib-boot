name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.format_version.outputs.version }}
      preview_version: ${{ steps.format_version.outputs.preview_version }}
      version_tag: ${{ steps.version.outputs.version_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate semantic version
        id: version
        uses: PaulHatch/semantic-version@v6.0.1
        with:
          tag_prefix: "v"
          major_pattern: "BREAKING CHANGE|!:"
          minor_pattern: "^feat"
          version_format: "${major}.${minor}.${patch}"

      - name: Format Versions
        id: format_version
        env:
          BASE_VERSION: ${{ steps.version.outputs.version }}
          INCREMENT: ${{ steps.version.outputs.increment }}
          MAJOR: ${{ steps.version.outputs.major }}
          MINOR: ${{ steps.version.outputs.minor }}
          PATCH: ${{ steps.version.outputs.patch }}
        run: |          
          # Package versions
          echo "version=$BASE_VERSION" >> $GITHUB_OUTPUT
          
          # Preview version includes the increment as a preview suffix
          PREVIEW_VERSION="${BASE_VERSION}-preview$(printf '%02d' $INCREMENT)"
          echo "preview_version=$PREVIEW_VERSION" >> $GITHUB_OUTPUT
          
          echo "Release version: $BASE_VERSION"
          echo "Preview version: $PREVIEW_VERSION"

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.version_tag }}
          git push origin ${{ steps.version.outputs.version_tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true

      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Set version
        run: |
          mvn versions:set-property \
            -Dproperty=revision \
            -DnewVersion=${{ needs.release.outputs.version }} \
            -DgenerateBackupPoms=false

      - name: Commit version update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout master
          git pull origin master
          git add pom.xml
          git commit -m "chore: bump version to ${{ needs.release.outputs.version }}"
          git push origin master

      - name: Publish
        run: mvn deploy -s $GITHUB_WORKSPACE/settings.xml
        env:
          GITHUB_TOKEN: ${{ github.token }}