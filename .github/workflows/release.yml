name: Prepare Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  versioning:
    if: github.ref_name == 'master' || startsWith(github.ref_name, 'hotfix/')
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      version_tag: v${{ steps.semver.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Calculate semantic version
        id: semver
        uses: PaulHatch/semantic-version@v6.0.1
        with:
          tag_prefix: "v"
          major_pattern: "BREAKING CHANGE|!:"
          minor_pattern: "^feat"
          version_format: "${major}.${minor}.${patch}"

      - name: Ensure tag does not exist
        run: |
          if git rev-parse "${{ needs.versioning.outputs.version_tag }}" >/dev/null 2>&1; then
            echo "❌ Tag already exists"
            exit 1
          fi

  bump_version:
    name: Bump Version
    runs-on: ubuntu-latest
    needs: versioning

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Update revision property
        run: |
          mvn versions:set-property \
            -Dproperty=revision \
            -DnewVersion=${{ needs.versioning.outputs.version }} \
            -DgenerateBackupPoms=false

      - name: Commit bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add pom.xml

          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            git commit -m "chore: bump version to ${{ needs.versioning.outputs.version }}"
            git push origin ${{ github.ref_name }}
          fi

  tag:
    name: Create Tag
    runs-on: ubuntu-latest
    needs: [versioning, bump_version]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Create and push tag
        run: |
          git tag ${{ needs.versioning.outputs.version_tag }}
          git push origin ${{ needs.versioning.outputs.version_tag }}